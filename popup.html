<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tab Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --accent: #f5c542;
      --accent2: #ff6b35;
      --text: #f0efe8;
      --muted: #7c7c8a;
      --border: #2e2e38;
      --radius: 10px;
    }

    body {
      width: 340px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      padding: 0;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }

    .main {
      padding: 14px 16px;
    }

    .note-area-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      height: 90px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent); }

    .char-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin-top: 5px;
    }

    .char-count.warn { color: var(--accent2); }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-save {
      flex: 1;
      background: var(--accent);
      color: #0e0e10;
      padding: 9px;
    }

    .btn-save:hover { background: #f7d060; transform: translateY(-1px); }
    .btn-save:active { transform: translateY(0); }

    .btn-clear {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 9px 14px;
    }

    .btn-clear:hover { color: var(--accent2); border-color: var(--accent2); }

    .toast {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--accent);
      color: #0e0e10;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0 10px;
    }

    .all-notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .all-notes-header span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .note-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .notes-list {
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-track { background: transparent; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .note-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .note-item:hover { border-color: var(--accent); }

    .note-item .note-url {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .note-item .note-text {
      font-size: 11px;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty-state {
      text-align: center;
      padding: 16px 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }

    .empty-state .big { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">📌</div>
    <div class="header-text">
      <h1>TAB NOTES</h1>
      <p id="tab-url">Loading...</p>
    </div>
  </header>

  <div class="main" style="position:relative;">
    <div class="note-area-wrap">
      <textarea id="note-input" maxlength="200" placeholder="Why did you open this tab? e.g. 'Read later — async article', 'Check pricing for project'…"></textarea>
    </div>
    <div class="char-count" id="char-count">0 / 200</div>

    <div class="actions">
      <button class="btn-save" id="btn-save">💾 Save Note</button>
      <button class="btn-clear" id="btn-clear">Clear</button>
    </div>

    <div class="toast" id="toast">Note saved!</div>

    <div class="divider"></div>

    <div class="all-notes-header">
      <span>All Noted Tabs</span>
      <span class="note-count" id="note-count">0 notes</span>
    </div>

    <div class="notes-list" id="notes-list">
      <div class="empty-state">
        <div class="big">🗒️</div>
        No notes yet. Start labelling your tabs!
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
